# 1. NOME DA APLICAÇĂO
spring.application.name=ms-notificacao

# 2. CONFIGURAÇĂO DO RABBITMQ (Docker)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 3. CONFIGURAÇĂO DE E-MAIL (Mailtrap)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=423c8ca4f64fc7
spring.mail.password=661c09d15d0c2e
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 4. CONFIGURAÇĂO DO BANCO DE DADOS (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_notificacoes
spring.datasource.username=postgres
spring.datasource.password=Keven#123
spring.datasource.driver-class-name=org.postgresql.Driver

# 5. JPA / HIBERNATE
# Usamos 'validate' porque o Flyway cuidará da criaçăo das tabelas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. FLYWAY (Controle de Versăo do Banco)
spring.flyway.enabled=true
